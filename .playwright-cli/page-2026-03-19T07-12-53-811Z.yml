      - paragraph [ref=e81]: Ads.txt setup is required for all publishers using Ezoic. This file helps maximize your ad revenue by ensuring authorized ad partners can bid on your inventory.
      - heading "What is Ads.txt? Link to this section" [level=2] [ref=e82]:
        - text: What is Ads.txt?
        - link "Link to this section" [ref=e83] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicads/adstxt/#what-is-adstxt
          - text: 🔗
      - paragraph [ref=e84]: Ads.txt is a simple text file that tells advertisers which companies are authorized to sell ads on your website. Think of it as a "verified seller" list that prevents unauthorized companies from selling fake ad space on your domain.
      - heading "Choose Your Setup Method Link to this section" [level=2] [ref=e85]:
        - text: Choose Your Setup Method
