                  - generic [ref=e45]: 6-8 år
                - paragraph [ref=e46]: Se på den kule monstertrucken som hopper over biler! Du kan bruke sterke farger og lage din egen stil. Kanskje monstertrucken skal være rød, grønn eller gul? Du kan også tegne mønstre på bilene under. Dette er en morsom tegning hvis du liker store biler og fart. Perfekt for deg som liker action og tøffe biler!
