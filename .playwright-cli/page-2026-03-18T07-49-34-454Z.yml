              - button "Start Fargelegging" [ref=e54] [cursor=pointer]
            - generic [ref=e55]:
              - 'heading "Tips for fargelegging: Hvordan kan du fargelegge \"Monstertruck flyr høyt over biler\" på best mulig måte?" [level=2] [ref=e56]'
              - paragraph [ref=e57]: Hvis du vil at monstertrucken skal se ekstra kul ut, kan du bruke sterke og klare farger. Velg farger som gjør at monstertrucken synes godt. Du kan for eksempel bruke rød, blå, grønn eller gul. De store dekkene kan du fargelegge mørke, for eksempel svart eller grå. Da ser de ekstra kraftige ut.
              - paragraph [ref=e58]: Himmelen rundt monstertrucken kan du gjøre lys blå for å vise at den flyr høyt. Kanskje du vil tegne og fargelegge noen støvskyer under hjulene? Du kan bruke brunt eller grått for det. Hvis du vil, kan du bruke både fargeblyanter og voksfarger. Da får bildet fine detaljer og ser mer spennende ut.
              - paragraph [ref=e59]: Husk at dette er ditt bilde! Du kan velge akkurat de fargene du liker best. Fantasien din bestemmer.
              - 'heading "Mulige fargeleggingsutfordringer: Hvilke områder er vanskelig å fargelegge og trenger særlig fokus for \"Monstertruck flyr høyt over biler\"?" [level=2] [ref=e60]'
              - list [ref=e61]:
                - listitem [ref=e62]:
                  - strong [ref=e63]: "Dekkene og små detaljer på monstertrucken:"
                  - text: Det er mange små mønstre på de store dekkene. Bruk en spiss blyant, så blir det lettere å fargelegge de små delene.
                - listitem [ref=e64]:
                  - strong [ref=e65]: "Skygger og lys:"
                  - text: Hvis du vil ha skygger på monstertrucken, kan du bruke flere farger som ligner på hverandre. Da kan du lage fine overganger. Trykk forsiktig med blyanten for å få lysere farger, og trykk hardere for mørkere farger.
                - listitem [ref=e66]:
                  - strong [ref=e67]: "Bakgrunnen:"
                  - text: Det kan være litt vanskelig å fargelegge himmelen og bakken sammen. Bruk lyse farger til himmelen, og brune eller grønne farger til bakken. Hvis du vil, kan du blande fargene litt der de møtes, så ser det mer naturlig ut.
              - heading "Fordeler med å fargelegge \"Monstertruck flyr høyt over biler\"" [level=2] [ref=e68]
              - paragraph [ref=e69]: Det er gøy å fargelegge en monstertruck som hopper! Du får bruke fantasien din og prøve ut mange forskjellige farger. Du kan gjøre monstertrucken akkurat så tøff du vil.
              - paragraph [ref=e70]: Når du fargelegger alle de små delene på monstertrucken, trener du også hånda di. Du blir flinkere til å holde blyanten stødig og til å følge linjer. Det hjelper deg både når du tegner og når du skriver.
              - paragraph [ref=e71]: Det er også bra å øve seg på å jobbe med et bilde en stund. Da lærer du å konsentrere deg og gjøre ferdig det du har begynt på. Det er en viktig ting å kunne, både på skolen og ellers i livet.
              - paragraph [ref=e72]: Så finn frem fargeblyantene og lag ditt eget monstertruck-bilde!
