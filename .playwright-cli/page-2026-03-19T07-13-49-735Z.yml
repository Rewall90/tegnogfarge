      - paragraph [ref=e1189]: "These functions allow for direct access to the two stages of rewarded ads: requesting and showing the ad."
      - paragraph [ref=e1190]: You can use these functions to create your own custom overlay or UI for asking the user if they want to view the ad, or if you want to integrate the ad more directly into your site, for example a button in a game.
      - paragraph [ref=e1191]: Keep in mind that you are still required to ask the user in some way whether they want to view the ad.
      - heading "request() Link to this section" [level=3] [ref=e1192]:
        - text: request()
        - link "Link to this section" [ref=e1193] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#request
          - text: 🔗
      - paragraph [ref=e1194]: This method requests a rewarded ad. It takes a callback function as a parameter, which is called once the ad is ready, if the ad went unfilled, or if an error occurs.
      - list [ref=e1195]:
        - listitem [ref=e1196]:
          - paragraph [ref=e1197]:
            - code [ref=e1198]: request()
            - strong [ref=e1199]: can
            - text: "be called:"
          - list [ref=e1200]:
            - listitem [ref=e1201]:
              - text: even if
              - code [ref=e1202]: show()
              - text: was never called (e.g., if the user declined to view the ad). After calling
              - code [ref=e1203]: request()
              - text: again,
              - code [ref=e1204]: show()
              - text: can then be called as normal.
            - listitem [ref=e1205]:
              - text: before the Ezoic rewarded ads code loads. It will be queued and executed once the code is loaded (this is the purpose of
              - code [ref=e1206]: window.ezRewardedAds.cmd.push()
              - text: in the example). There should only be a very brief delay between the page loading (or, in the case of a standalone integration, the first call to
              - code [ref=e1207]: ezstandalone.showAds()
              - text: or
              - code [ref=e1208]: initRewardedAds()
              - text: ) and the rewarded ad code loading.
        - listitem [ref=e1209]:
          - paragraph [ref=e1210]:
            - text: once
            - code [ref=e1211]: request()
            - text: has been called, it
            - strong [ref=e1212]: cannot
            - text: "be called:"
          - list [ref=e1213]:
            - listitem [ref=e1214]: until the callback is called. Only one request can be made at a time.
            - listitem [ref=e1215]:
              - text: while an ad is already showing (ie. after
              - code [ref=e1216]: show()
              - text: is called but before the ad window is closed).
