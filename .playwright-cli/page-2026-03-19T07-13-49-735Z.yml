      - list [ref=e1541]:
        - listitem [ref=e1542]:
          - paragraph [ref=e1543]:
            - strong [ref=e1544]: "Single Request at a Time:"
            - text: If an ad is already loading, subsequent calls to
            - code [ref=e1545]: request()
            - text: or
            - code [ref=e1546]: requestWithOverlay()
            - text: will trigger an error callback (
            - code [ref=e1547]: result.status = false
            - text: ). Wait for the current ad load to complete before calling
            - code [ref=e1548]: request()
            - text: again.
        - listitem [ref=e1549]:
          - paragraph [ref=e1550]:
            - strong [ref=e1551]: "Ad Readiness:"
            - text: Calling
            - code [ref=e1552]: show()
            - text: when no ad is ready will result in an error callback (
            - code [ref=e1553]: result.status = false
            - text: ) with a message like
            - code [ref=e1554]: "\"rewarded ad not ready. call request() first\""
            - text: .
        - listitem [ref=e1555]:
          - paragraph [ref=e1556]:
            - strong [ref=e1557]: "Valid Callbacks:"
            - text: Always pass a valid function to the callback argument to all methods. If an argument is not provided, or if the provided argument is not a function, a warning is logged and no further action will be taken.
      - heading "Specialized Rewarded Ad Types Link to this section" [level=2] [ref=e1558]:
        - text: Specialized Rewarded Ad Types
        - link "Link to this section" [ref=e1559] [cursor=pointer]:
