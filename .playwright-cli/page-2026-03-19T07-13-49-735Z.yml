    - main [ref=e203]:
      - heading "Rewarded Ads" [level=1] [ref=e204]
      - paragraph [ref=e205]: Rewarded ads are a type of ad that allows users to view an ad for a minimum amount of time in exchange for a reward.
      - paragraph [ref=e206]: Rewarded ads fill the entire display, similar to how interstitial ads are displayed. Two key differences are that video ads can be displayed in addition to banner ads, and there is a timer that must be completed before the reward is granted. The time remaining is displayed to the user as it counts down.
      - paragraph [ref=e207]: The user can close the ad at any time, but if it is closed before the timer is up, the reward will not be granted. The user will be prompted to confirm that they want to close the ad early and forfeit the reward.
      - paragraph [ref=e208]: The ad remains on screen after the timer has expired, at which point the user can close the ad without forfeiting the reward.
      - heading "Integration Link to this section" [level=2] [ref=e209]:
        - text: Integration
        - link "Link to this section" [ref=e210] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#integration
          - text: 🔗
      - paragraph [ref=e211]: We provide an interface for requesting and displaying the ads (detailed below), and we notify your code when the ad window is closed, and whether the reward was granted, through a callback.
      - paragraph [ref=e212]: You are responsible for integrating the rewards into your app. This includes asking the user if they want to view the ad, and handling the reward when it is granted.
      - paragraph [ref=e213]: Rewarded ads can be requested to be shown at any time. After requesting, there will be a short delay (1-2 seconds) while we fetch an ad before it is ready to be shown.
      - paragraph [ref=e214]: You must always ask the user if they want to view the ad before showing it, and you cannot mislead or incentivize the user to view the ad.
      - paragraph [ref=e215]:
        - strong [ref=e216]: "Note on Callback Functions:"
        - text: The examples below use arrow functions for callbacks. Arrow functions preserve the lexical
        - code [ref=e217]: this
        - text: context from the enclosing scope. If you need to use
        - code [ref=e218]: this
        - text: within your callback and are using anonymous function expressions instead of arrow functions, make sure to use
        - code [ref=e219]: .bind(this)
        - text: "to preserve the correct context:"
      - generic [ref=e220]:
        - code [ref=e223]:
          - generic [ref=e225]: "// Arrow function (recommended) - preserves `this` context"
          - generic [ref=e227]: "window.ezRewardedAds.requestAndShow((result) => {"
          - generic [ref=e229]: "this.handleResult(result); // `this` refers to enclosing scope"
          - generic [ref=e231]: "});"
          - generic [ref=e233]: "// Anonymous function with .bind(this) if `this` is needed"
          - generic [ref=e235]: "window.ezRewardedAds.requestAndShow(function(result) {"
          - generic [ref=e237]: "this.handleResult(result); // `this` is preserved via .bind()"
          - generic [ref=e239]: "}.bind(this));"
        - generic [ref=e240]:
          - link "Copy" [ref=e241] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#
            - img [ref=e242]
          - link "Toggle line numbers" [ref=e244] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#
            - img [ref=e245]
        - generic [ref=e247]: javascript
      - heading "Reward Restrictions Link to this section" [level=2] [ref=e248]:
        - text: Reward Restrictions
        - link "Link to this section" [ref=e249] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#reward-restrictions
          - text: 🔗
      - paragraph [ref=e250]: "You are free to choose the reward that you offer to the user. However, there are some restrictions on what you can offer:"
      - list [ref=e251]:
        - listitem [ref=e252]:
          - paragraph [ref=e253]: The reward may not be a direct monetary item under any circumstance. Examples include cash, cryptocurrency, or gift cards.
        - listitem [ref=e254]:
          - paragraph [ref=e255]: The reward may be an indirect monetary item, as long as it is non-transferrable, and only redeemable within your platform, website, or app.
          - list [ref=e256]:
            - listitem [ref=e257]:
              - paragraph [ref=e258]: Indirect monetary items are items with monetary value that aren't a direct form of payment in the real world. If the reward is a discount or voucher for a physical item, they must not exceed 25% of the item's value.
            - listitem [ref=e259]:
              - paragraph [ref=e260]: Examples of indirect monetary items include discounts, loyalty rewards or points, product free shipping, product or service free trials, game character extra lives, and game character skins.
        - listitem [ref=e261]:
          - paragraph [ref=e262]: "Random rewards are allowed with some restrictions:"
          - list [ref=e263]:
            - listitem [ref=e264]:
              - paragraph [ref=e265]: You must disclose the odds of receiving each reward before the user agrees to view the ad.
            - listitem [ref=e266]:
              - paragraph [ref=e267]: Details on all rewards must be easily accessible to the user.
            - listitem [ref=e268]:
              - paragraph [ref=e269]: The odds of receiving any reward must be greater than zero.
        - listitem [ref=e270]:
          - paragraph [ref=e271]: More than one rewarded ad can be required to be watched back-to-back for one reward, but this must be clearly disclosed to the user before they accept to watch the ads.
      - paragraph [ref=e272]:
        - text: "You can read more about Google's rewarded ad policies here:"
        - link "https://support.google.com/admanager/answer/7496282" [ref=e273] [cursor=pointer]:
          - /url: https://support.google.com/admanager/answer/7496282
      - heading "Initialization Link to this section" [level=2] [ref=e274]:
        - text: Initialization
        - link "Link to this section" [ref=e275] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#initialization
          - text: 🔗
      - paragraph [ref=e276]:
        - text: The following code must be included before any other rewarded ad functions are called, no matter what integration type you are using. Ideally, this code should be included in the
        - code [ref=e277]: <head>
        - text: of your page, or at least at the top of the
        - code [ref=e278]: <body>
        - text: .
      - generic [ref=e279]:
        - code [ref=e282]:
          - generic [ref=e284]: "window.ezRewardedAds = window.ezRewardedAds || {};"
          - generic [ref=e286]: window.ezRewardedAds.cmd = window.ezRewardedAds.cmd || [];
        - generic [ref=e287]:
          - link "Copy" [ref=e288] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#
            - img [ref=e289]
          - link "Toggle line numbers" [ref=e291] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#
            - img [ref=e292]
        - generic [ref=e294]: javascript
      - heading "Javascript Integration Link to this section" [level=3] [ref=e295]:
        - text: Javascript Integration
        - link "Link to this section" [ref=e296] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#javascript-integration
          - text: 🔗
      - paragraph [ref=e297]:
        - text: If you are integrated with Javascript, the page must have the
        - code [ref=e298]: ezstandalone
        - text: initialization, as well as at least one call to initialize the ads. If the page does not already initialize ads (e.g., with
        - code [ref=e299]: showAds()
        - text: or similar), you can use
        - code [ref=e300]: initRewardedAds()
        - text: to load the rewarded ads code along with any other ad types you want enabled. Note that this will not request a rewarded ad, that must be done separately.
      - paragraph [ref=e301]:
        - text: If you already have ads on the page, you only need the
        - code [ref=e302]: ezRewardedAds
        - text: initialization code.
      - generic [ref=e303]:
