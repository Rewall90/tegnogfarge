      - heading "Content Locker Link to this section" [level=3] [ref=e1560]:
        - text: Content Locker
        - link "Link to this section" [ref=e1561] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#content-locker
          - text: 🔗
      - paragraph [ref=e1562]: Content Locker is a specialized implementation of rewarded ads that gates specific content or actions behind ad viewing. It automatically selects the highest revenue ad format from multiple types (rewarded video, interstitial, or outstream video ads) to maximize revenue while providing a seamless user experience.
      - heading "Key Features Link to this section" [level=4] [ref=e1563]:
        - text: Key Features
        - link "Link to this section" [ref=e1564] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicadsadvanced/rewarded/#key-features
          - text: 🔗
      - list [ref=e1565]:
        - listitem [ref=e1566]:
          - strong [ref=e1567]: Multi-format competition
          - text: ": Automatically competes rewarded video ads against interstitial and outstream video ads, selecting the format with the highest CPM"
        - listitem [ref=e1568]:
          - strong [ref=e1569]: Smart fallbacks
          - text: ": If the primary rewarded ad doesn't fill, it intelligently falls back to alternative ad formats"
        - listitem [ref=e1570]:
          - strong [ref=e1571]: Flexible actions
          - text: ": Supports both URL redirects and callback functions as the gated action"
        - listitem [ref=e1572]:
          - strong [ref=e1573]: Loading states
          - text: ": Optional loading overlay to improve user experience during ad loading"
        - listitem [ref=e1574]:
          - strong [ref=e1575]: Customizable UI
          - text: ": Configurable call-to-action text and styling"
      - heading "Usage Link to this section" [level=4] [ref=e1576]:
