                    - paragraph [ref=e601]:
                      - strong [ref=e602]: Initial Account / Domain Review for Google MCM
                      - text: Due to the high volume of requests, we're unable to provide individual site feedback within the Ezoic community. However, you can find relevant information on the review process via the Dashboard, community posts, and our support site.
                      - link "Applying to Google AdManager MCM" [ref=e603] [cursor=pointer]:
                        - /url: https://support.ezoic.com/kb/article/applying-to-google-ad-manager-multiple-customer-management
                    - paragraph [ref=e604]:
                      - strong [ref=e605]: Please refer to our MCM guide for insights on Google MCM account and domain denial definitions, and strategies for improving approval chances.
                      - link "MCM Disapproved Guide" [ref=e606] [cursor=pointer]:
                        - /url: https://support.ezoic.com/kb/article/my-account-or-domain-was-disapproved-by-google-mcm-how-do-i-fix-this
                    - paragraph [ref=e607]:
                      - strong [ref=e608]: Domain Escalation / Additional Google Review
                      - text: When a domain is disapproved, we conduct a content review and escalate the site directly to Google if it meets their criteria. You'll receive notification in your dashboard if your site is escalated.
                      - link "Escalation Review Process" [ref=e609] [cursor=pointer]:
                        - /url: https://community.ezoic.com/d/27805-domain-escalation-review-process-for-admanager-mcm
                    - paragraph [ref=e610]:
                      - strong [ref=e611]: "Timeline:"
                      - text: The Ad Manager domain review is completed by Google and typically takes up to two weeks. We're unable to expedite this process, but you'll be automatically informed of Google's decision via the Dashboard. If there is a domain denial, please allow 3-4 business days for our escalation review before re-applying via your Dashboard.
                    - paragraph [ref=e612]:
                      - strong [ref=e613]: "Notes:"
                    - list [ref=e614]:
                      - listitem [ref=e615]: "'Ready' status in AdManager is not an approval - it indicates that the account is ready to be reviewd."
                      - listitem [ref=e616]: If your domain is being denied quickly, it means you're reapplying the site too frequently without making the required changes to the site content.
                      - listitem [ref=e617]: Admanager MCM Account and Domain approval are required for ads to show through Ezoic.
                      - listitem [ref=e618]:
                        - text: "ID and PIN verification may be required on new Google accounts, see details here:"
                        - link "ID / PIN Verification Process" [ref=e619] [cursor=pointer]:
                          - /url: https://support.ezoic.com/kb/article/google-ad-manager-id-and-address-verification-guide
                    - paragraph [ref=e620]: If your query is not about the AdManager review process, or these answers did not address the issue you're facing, simply reply to this message for further assistance from our staff. Thank you for your patience and cooperation.
