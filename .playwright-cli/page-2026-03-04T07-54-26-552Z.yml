                    - strong [ref=e129]: Initial Account / Domain Review for Google MCM
                    - text: Due to the high volume of requests, we're unable to provide individual site feedback within the Ezoic community. However, you can find relevant information on the review process via the Dashboard, community posts, and our support site.
                    - link "Applying to Google AdManager MCM" [ref=e130] [cursor=pointer]:
                      - /url: https://support.ezoic.com/kb/article/applying-to-google-ad-manager-multiple-customer-management
                  - paragraph [ref=e131]:
                    - strong [ref=e132]: Please refer to our MCM guide for insights on Google MCM account and domain denial definitions, and strategies for improving approval chances.
                    - link "MCM Disapproved Guide" [ref=e133] [cursor=pointer]:
                      - /url: https://support.ezoic.com/kb/article/my-account-or-domain-was-disapproved-by-google-mcm-how-do-i-fix-this
                  - paragraph [ref=e134]:
                    - strong [ref=e135]: Domain Escalation / Additional Google Review
                    - text: When a domain is disapproved, we conduct a content review and escalate the site directly to Google if it meets their criteria. You'll receive notification in your dashboard if your site is escalated.
                    - link "Escalation Review Process" [ref=e136] [cursor=pointer]:
                      - /url: https://community.ezoic.com/d/27805-domain-escalation-review-process-for-admanager-mcm
                  - paragraph [ref=e137]:
                    - strong [ref=e138]: "Timeline:"
                    - text: The Ad Manager domain review is completed by Google and typically takes up to two weeks. We're unable to expedite this process, but you'll be automatically informed of Google's decision via the Dashboard. If there is a domain denial, please allow 3-4 business days for our escalation review before re-applying via your Dashboard.
                  - paragraph [ref=e139]:
                    - strong [ref=e140]: "Notes:"
                  - list [ref=e141]:
                    - listitem [ref=e142]: "'Ready' status in AdManager is not an approval - it indicates that the account is ready to be reviewd."
                    - listitem [ref=e143]: If your domain is being denied quickly, it means you're reapplying the site too frequently without making the required changes to the site content.
                    - listitem [ref=e144]: Admanager MCM Account and Domain approval are required for ads to show through Ezoic.
                    - listitem [ref=e145]:
                      - text: "ID and PIN verification may be required on new Google accounts, see details here:"
                      - link "ID / PIN Verification Process" [ref=e146] [cursor=pointer]:
                        - /url: https://support.ezoic.com/kb/article/google-ad-manager-id-and-address-verification-guide
                  - paragraph [ref=e147]: If your query is not about the AdManager review process, or these answers did not address the issue you're facing, simply reply to this message for further assistance from our staff. Thank you for your patience and cooperation.
