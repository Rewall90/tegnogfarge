    - main [ref=e70]:
      - 'heading "Step 3: Ad Placements" [level=1] [ref=e71]'
      - paragraph [ref=e72]: Now that you've integrated Ezoic's scripts and set up your ads.txt file, it's time to add ad placements to your website. This final step will start displaying ads and generating revenue.
      - heading "Create Your Ad Placements Link to this section" [level=2] [ref=e73]:
        - text: Create Your Ad Placements
        - link "Link to this section" [ref=e74] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicads/implementation/#create-your-ad-placements
          - text: 🔗
      - paragraph [ref=e75]: First, you'll need to create ad placements in your Ezoic dashboard. These define where ads will appear on your website.
      - paragraph [ref=e76]:
        - text: You can create placements yourself in your
        - link "Ezoic Dashboard" [ref=e77] [cursor=pointer]:
          - /url: https://pubdash.ezoic.com/ezoicads/adpositions/placeholders
        - text: ", or work with your Ezoic Onboarding Specialist for optimized placement recommendations."
      - heading "Add Placement Code to Your Website Link to this section" [level=2] [ref=e78]:
        - text: Add Placement Code to Your Website
        - link "Link to this section" [ref=e79] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicads/implementation/#add-placement-code-to-your-website
          - text: 🔗
      - paragraph [ref=e80]: "Once you have your ad placement IDs, add this code wherever you want ads to appear on your site:"
      - generic [ref=e81]:
        - code [ref=e84]:
          - generic [ref=e86]: <div id="ezoic-pub-ad-placeholder-101"></div>
          - generic [ref=e88]: <script>
          - generic [ref=e90]: "ezstandalone.cmd.push(function () {"
          - generic [ref=e92]: ezstandalone.showAds(101);
          - generic [ref=e94]: "});"
          - generic [ref=e96]: </script>
        - generic [ref=e97]:
          - link "Copy" [ref=e98] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicads/implementation/#
            - img [ref=e99]
          - link "Toggle line numbers" [ref=e101] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicads/implementation/#
            - img [ref=e102]
        - generic [ref=e104]: html
      - paragraph [ref=e105]:
        - text: Replace
        - code [ref=e106]: "101"
        - text: with your actual placement ID from the dashboard. Insert this code for each ad location on your site.
      - generic [ref=e107]:
        - paragraph [ref=e108]:
          - text: Pages with multiple placements should pass all placement IDs into a single
          - code [ref=e109]: showAds()
          - text: call. This reduces server requests and improves loading speed.
        - paragraph [ref=e110]:
          - emphasis [ref=e111]:
            - text: "Example:"
            - code [ref=e112]: ezstandalone.showAds(101, 102, 103, 104)
      - generic [ref=e113]:
        - paragraph [ref=e114]:
          - text: DO NOT add any styling to the actual placeholder
          - code [ref=e115]: div
          - text: .
        - paragraph [ref=e116]: Adding styles or reserving space for the ad may result in empty white space if an ad doesn't load.
      - generic [ref=e117]:
        - text: Calling
        - code [ref=e118]: ezstandalone.showAds()
        - text: without defining a placeholder value will call the function for every placeholder that exists on that page.
      - generic [ref=e119]:
        - strong [ref=e120]: "Important:"
        - text: To ensure Ezoic ads work properly on your site, don't forget to remove any leftover ad code from other ad networks.
      - heading "Setup Complete Link to this section" [level=2] [ref=e121]:
        - text: Setup Complete
        - link "Link to this section" [ref=e122] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicads/implementation/#setup-complete
          - text: 🔗
      - paragraph [ref=e123]: Once you have completed these steps, you have successfully implemented EzoicAds on your site. If you have any questions or need assistance, please reach out to Ezoic's support team.
