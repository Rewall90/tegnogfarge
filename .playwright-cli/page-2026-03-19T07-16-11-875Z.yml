    - main [ref=e72]:
      - heading "Troubleshooting" [level=1] [ref=e73]
      - paragraph [ref=e74]: When setting up EzoicAds on your site, it's important to ensure that everything is functioning properly. We provide a built-in JavaScript Integration Debugger that allows you to quickly diagnose issues with your ad setup. Below is a step-by-step guide on how to use this debugger and interpret its outputs.
      - 'heading "Step 1: Trigger the Debugger Link to this section" [level=2] [ref=e75]':
        - text: "Step 1: Trigger the Debugger"
        - link "Link to this section" [ref=e76] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicads/troubleshooting/#step-1-trigger-the-debugger
          - text: 🔗
      - paragraph [ref=e77]: "To activate the debugger, simply append the following query parameter to the URL of the page where your EzoicAds are integrated:"
      - generic [ref=e79]:
        - code [ref=e82]:
          - generic [ref=e84]: ez_js_debugger=1
        - generic [ref=e85]:
          - link "Copy" [ref=e86] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicads/troubleshooting/#
            - img [ref=e87]
          - link "Toggle line numbers" [ref=e89] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicads/troubleshooting/#
            - img [ref=e90]
        - generic [ref=e92]: not set
      - paragraph [ref=e93]: "For example:"
      - generic [ref=e95]:
        - code [ref=e98]:
          - generic [ref=e100]: https://www.yourwebsite.com?ez_js_debugger=1
        - generic [ref=e101]:
          - link "Copy" [ref=e102] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicads/troubleshooting/#
            - img [ref=e103]
          - link "Toggle line numbers" [ref=e105] [cursor=pointer]:
            - /url: https://docs.ezoic.com/docs/ezoicads/troubleshooting/#
            - img [ref=e106]
        - generic [ref=e108]: not set
      - paragraph [ref=e109]: Once the query parameter is added and the page loads, a green modal dialog will appear at the bottom center of the screen. This is the JavaScript Integration Debugger.
      - 'heading "Step 2: Understanding the Debugger Output Link to this section" [level=2] [ref=e110]':
        - text: "Step 2: Understanding the Debugger Output"
        - link "Link to this section" [ref=e111] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicads/troubleshooting/#step-2-understanding-the-debugger-output
          - text: 🔗
      - paragraph [ref=e112]: "The debugger modal contains several key pieces of information that will help you troubleshoot your setup. Here’s a breakdown of the information provided:"
      - list [ref=e113]:
        - listitem [ref=e114]:
          - paragraph [ref=e115]:
            - strong [ref=e116]:
              - text: Script In Page
              - code [ref=e117]: <head>
              - text: Element
            - text: ": The debugger verifies the presence of the Ezoic integration script ("
            - code [ref=e118]: sa.min.js
            - text: ) in the page's
            - code [ref=e119]: <head>
            - text: element. This ensures the script is optimally positioned for effective page loading.
        - listitem [ref=e120]:
          - paragraph [ref=e121]:
            - strong [ref=e122]: Consent
            - text: ": This section checks for the use of Ezoic consent management tools, including an API call or the presence of the Consent Management Platform (CMP) script on the page. These checks ensure that user privacy is managed in compliance with regulations. For more information on privacy management, see the"
            - link "Privacy Documentation" [ref=e123] [cursor=pointer]:
              - /url: https://docs.ezoic.com/docs/ezoicads/privacy/
            - text: .
          - list [ref=e124]:
            - listitem [ref=e125]:
              - text: The CMP script checks include verifying its presence on the page, its placement within the page's
              - code [ref=e126]: <head>
              - text: element, and ensuring it appears before Ezoic's integration script (
              - code [ref=e127]: sa.min.js
              - text: ) in the HTML structure.
        - listitem [ref=e128]:
          - paragraph [ref=e129]:
            - strong [ref=e130]: Ad Request
            - text: ": The debugger tracks whether an ad request to Ezoic's servers is successfully sent and provides key details, such as the word count and the maximum number of allowed ads."
          - list [ref=e131]:
            - listitem [ref=e132]: This section includes a word count consistency check to ensure ad requests are not sent too early—before the primary page content has fully loaded. Maintaining a consistent word count helps verify that dynamic content remains stable, ensuring accurate ad rendering.
        - listitem [ref=e133]:
          - paragraph [ref=e134]:
            - strong [ref=e135]: Defined Placeholders
            - text: ": This section provides detailed information about the ad placeholder ids used in the last network request to Ezoic."
          - list [ref=e136]:
            - listitem [ref=e137]: For each ID, the debugger displays the corresponding HTML element on the page, whether the ID was selected for ad insertion, and its associated ad unit name and size.
        - listitem [ref=e138]:
          - paragraph [ref=e139]:
            - strong [ref=e140]: Unused Placeholders
            - text: ": This section lists the IDs of ad placeholders that are present in the page's HTML but were not included in the most recent network request to Ezoic."
        - listitem [ref=e141]:
          - paragraph [ref=e142]:
            - strong [ref=e143]: API Methods Called
            - text: ": The debugger displays each method invoked on the"
            - code [ref=e144]: ezstandalone
            - text: API, displaying them in the order of execution along with their provided arguments. This detailed tracking helps identify potential implementation issues.
      - 'heading "Step 3: Using the Debugger for Troubleshooting Link to this section" [level=2] [ref=e145]':
        - text: "Step 3: Using the Debugger for Troubleshooting"
        - link "Link to this section" [ref=e146] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicads/troubleshooting/#step-3-using-the-debugger-for-troubleshooting
          - text: 🔗
      - paragraph [ref=e147]: "The information provided in the debugger modal is invaluable for diagnosing common issues such as:"
      - list [ref=e148]:
        - listitem [ref=e149]:
          - paragraph [ref=e150]:
            - strong [ref=e151]: Ads Not Displaying
            - text: ": Check the placeholder detection and ad status to ensure placeholders are defined and ads are assigned."
        - listitem [ref=e152]:
          - paragraph [ref=e153]:
            - strong [ref=e154]: Ad Requests Failing
            - text: ": If ad requests aren't being sent or are failing, the debugger will provide error messages that point to potential misconfigurations."
        - listitem [ref=e155]:
          - paragraph [ref=e156]:
            - strong [ref=e157]: Script Loading Issues
            - text: ": If the script isn’t properly loaded, verify that the script tag is present in your source code and correctly configured."
      - heading "Conclusion Link to this section" [level=2] [ref=e158]:
        - text: Conclusion
        - link "Link to this section" [ref=e159] [cursor=pointer]:
          - /url: https://docs.ezoic.com/docs/ezoicads/troubleshooting/#conclusion
          - text: 🔗
      - paragraph [ref=e160]: The EzoicAds JavaScript Integration Debugger is a simple but powerful tool to help you ensure that your ad setup is functioning as intended. By following these steps, you can quickly identify and resolve common issues, ensuring that your ads display properly and without disruption.
