          - paragraph [ref=e426]: Velkommen til Kjøretøy, en kategori full av action, fart og motorbrøl! Her kan barna fargelegge alt fra raske racerbiler og monstertrucker til helikoptre, busser, fly og traktorer. Motivene er tilpasset ulike aldersgrupper og passer like godt for de yngste som nettopp har begynt å fargelegge, som for de litt eldre som liker flere detaljer. Alle tegningene er helt gratis og kan enten lastes ned som høyoppløselige PDF-er til utskrift, eller fargelegges direkte i nettleseren – enkelt og tilgjengelig for alle. Dette er en perfekt aktivitet for bilglade barn, skoleprosjekter med transporttema, eller bare en kreativ pause hjemme.
