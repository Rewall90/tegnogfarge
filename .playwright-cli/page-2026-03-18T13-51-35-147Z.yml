              - button "Start Fargelegging" [ref=e54] [cursor=pointer]
            - generic [ref=e55]:
              - 'heading "Tips for fargelegging: Hvordan kan du fargelegge \"Border collie som løper fort\" på best mulig måte?" [level=2] [ref=e56]'
              - paragraph [ref=e57]: Når du fargelegger en border collie som løper ute, kan du bruke fantasien din. Tenk på hvor glad og rask hunden er. Bruk glade og lyse farger. En border collie har ofte svart, hvit og litt brun pels. Du kan bruke forskjellige fargeblyanter eller tusjer for å vise dette. Prøv å bruke flere farger for å gjøre pelsen ekstra fin og fluffy. Til slutt kan du tegne en bakgrunn med grønne gress, blå himmel eller blomster. Da ser det ut som hunden løper i naturen.
              - 'heading "Mulige fargeleggingsutfordringer: Hvilke områder er vanskelig å fargelegge og trenger særlig fokus for \"Border collie som løper fort\"?" [level=2] [ref=e58]'
              - list [ref=e59]:
                - listitem [ref=e60]:
                  - strong [ref=e61]: "Pelsen:"
                  - text: Border collien har mye pels som ser myk og bustete ut. Det kan være litt vanskelig å få til. Prøv å lage små, korte streker med blyanten for å få det til å se ut som ekte pels.
                - listitem [ref=e62]:
                  - strong [ref=e63]: "Ansiktet:"
                  - text: Hunden har ofte et smilende og glad ansikt. Øyne og munn er små, så bruk en spiss blyant eller tynn tusj for å tegne detaljene.
                - listitem [ref=e64]:
                  - strong [ref=e65]: "Bevegelsen:"
                  - text: Det kan være vanskelig å vise at hunden løper fort. Du kan tegne noen streker bak hunden eller bruke litt mørkere farger på potene for å vise fart.
              - heading "Fordeler med å fargelegge \"Border collie som løper fort\"" [level=2] [ref=e66]
              - paragraph [ref=e67]: Når du fargelegger en border collie som løper fort, får du bruke fantasien din. Det er gøy å velge farger og lage et bilde av en glad hund. Du lærer å tegne små detaljer, som pelsen og ansiktet. Dette hjelper deg å bli flinkere til å tegne og å bruke hendene dine bedre. Du må også konsentrere deg, så du blir mer tålmodig. Å fargelegge dette motivet gjør at du kan øve på å jobbe nøye og følge med på små ting, og det er nyttig både på skolen og hjemme.
