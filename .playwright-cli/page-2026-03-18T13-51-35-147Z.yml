                - paragraph [ref=e42]: 2025/06/20
                - generic [ref=e43]:
                  - generic [ref=e44]: Middels
                  - generic [ref=e45]: 6-8 år
                - paragraph [ref=e46]: Her ser du en glad Border Collie som løper fort i gresset. Hunden har svart og hvit pels. Gresset er grønt. Dette er en morsom tegning å fargelegge hvis du liker hunder. Tegningen passer best for barn som er 6 til 8 år. Du kan farge hunden svart og hvit, og bruke grønt på gresset. Kanskje du også vil tegne en blå himmel?
