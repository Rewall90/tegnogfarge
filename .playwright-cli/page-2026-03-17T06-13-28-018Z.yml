                        - strong [ref=e877]: Immediate value
                        - text: "- Receive rewards or access to premium content"
                      - listitem [ref=e878]:
                        - strong [ref=e879]: Non-intrusive
                        - text: "- Ads don't interrupt the browsing experience"
                      - listitem [ref=e880]:
