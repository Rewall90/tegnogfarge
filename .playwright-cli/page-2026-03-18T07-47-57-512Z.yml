            - generic [ref=e1062]:
              - 'heading "Tips for fargelegging: Hvordan kan du fargelegge \"Isbil på store monsterhjul\" på best mulig måte?" [level=2] [ref=e1063]'
              - paragraph [ref=e1064]: Når du skal fargelegge "Isbil på store monsterhjul", kan du bruke akkurat de fargene du har lyst til! Tenk på de store hjulene – de kan være grønne, blå, gule, eller alle regnbuens farger. Isbilen kan du pynte med fine pastellfarger, eller kanskje sterke, klare farger som minner om is. Små flagg og pynt på bilen kan du lage så fargerike du vil. Bruk gjerne både fargeblyanter, tusjer og fargestifter. Det viktigste er å ha det gøy og bruke fantasien din. Det er ingen regler for hvordan monstertrucken eller iskremmaskinen skal se ut!
              - 'heading "Mulige fargeleggingsutfordringer: Hvilke områder er vanskelig å fargelegge og trenger særlig fokus for \"Isbil på store monsterhjul\"?" [level=2] [ref=e1065]'
              - list [ref=e1066]:
                - listitem [ref=e1067]:
                  - strong [ref=e1068]: "De store hjulene:"
                  - text: Det kan være litt vanskelig å få til alle mønstrene og detaljene på hjulene. Prøv å bruke mørkere farger på kantene og lysere inni hjulene. Da ser de ekstra store og kule ut.
                - listitem [ref=e1069]:
                  - strong [ref=e1070]: "Små detaljer på iskremmaskinen:"
                  - text: Noen deler, som dørhåndtak og små pyntestriper, er små og kan være litt vanskelige. Da kan du bruke en spiss blyant eller tynn tusj, så blir det lettere å treffe riktig.
                - listitem [ref=e1071]:
                  - strong [ref=e1072]: "Der bilen møter hjulene:"
                  - text: Der hvor bilen går over i hjulene, kan det bli litt rart hvis fargene blander seg for mye. Prøv å bruke en myk fargestift eller blyant og gni forsiktig for å få en fin overgang.
              - heading "Fordeler med å fargelegge \"Isbil på store monsterhjul\"" [level=2] [ref=e1073]
              - paragraph [ref=e1074]: Når du fargelegger en "Isbil på store monsterhjul", får du brukt fantasien din masse! Du kan velge alle slags farger, og finne på kule mønstre. Det er gøy å tenke på at monstertrucken kanskje har smak av jordbær, sjokolade eller blåbær.
              - paragraph [ref=e1075]: Samtidig trener du på å bruke hånda di rolig, og du øver på å holde deg innenfor strekene. Det er bra for å bli flink til å skrive, tegne og gjøre andre ting med hendene. Du lærer også å jobbe litt konsentrert, og det kan hjelpe deg i mange andre ting du gjør.
              - paragraph [ref=e1076]: Dette fargeleggingsbildet passer for hele familien. Det er morsomt, og dere kan snakke sammen om hvilke smaker og farger dere liker. Kanskje får dere lyst på en is når dere er ferdige!
