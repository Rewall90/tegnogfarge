                - paragraph [ref=e1053]: Her ser du en stor monstertruck. Bakpå har den en iskremmaskin. Bilen ser kul ut. Den kan lage masse is! Dette bildet passer for deg som liker store biler og is. Du kan bruke sterke farger når du fargelegger. Kanskje du vil ha grønn eller blå bil? Hva med rosa eller gul is? Bruk fantasien din!
