                  - textbox "Write a Post (public)..." [active] [ref=e438]: "MCM Invitation Stuck on \"Deactivated by Ad Manager\" - Need Help Reactivating Hi Ezoic team, I am trying to complete the Google Ad Manager (MCM) setup for my site tegnogfarge.no, but the MCM invitation from Ezoic (Network code: 1254144) is showing \"Deactivated by Ad Manager\" in my Google Ad Manager account (Network code: 22712188410). Here is what I have tried so far: 1. Clicked the \"View request\" link from the Google invitation email - it redirected me to the MCM page but the status remained \"Deactivated by Ad Manager\" 2. Used the \"Update Info\" option on the Ezoic dashboard to re-submit my Ad Manager email and network code, and clicked \"Send Invite\" - still shows deactivated 3. Clicked \"Resend Invite\" on the Ezoic dashboard - received a new email from Google but the issue persists 4. My Ad Manager account is active and I can navigate it fully - it is only the MCM relationship that is deactivated My Ezoic dashboard still shows: - Ad Manager Account Status: Invited - Ad Manager Domain Status: Waiting It seems like the old MCM relationship was deactivated (possibly due to inactivity) and new invitations are not going through because of this. Could someone from the Ezoic team please look into this and help reactivate or reset the MCM invitation for my account? I would really appreciate any assistance. Thank you!"
