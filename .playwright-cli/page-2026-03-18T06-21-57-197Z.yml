                    - heading "Rewarded Ads Overview" [level=1] [ref=e636]
                    - paragraph [ref=e637]: Rewarded ads are a powerful monetization tool that allows publishers to offer value to their users while generating revenue. These ads provide users with incentives (rewards) in exchange for engaging with advertisements.
                    - heading "What are Rewarded Ads?" [level=2] [ref=e638]
                    - paragraph [ref=e639]: Rewarded ads are video or interactive advertisements that users voluntarily watch or engage with in exchange for in-app rewards, premium content access, or other benefits. Unlike traditional display ads, rewarded ads create a positive user experience by providing immediate value.
                    - heading "Key Benefits" [level=2] [ref=e640]
                    - heading "For Publishers" [level=3] [ref=e641]
