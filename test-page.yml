                - paragraph [ref=e46]: Her ser du en alv som jobber som frisør for en enhjørning. Alven børster det lange håret til enhjørningen. Det er mye gøy du kan fargelegge. Du kan farge kjolen til alven og manen til enhjørningen. Bruk de fargene du liker best! Kanskje du vil gi alven en lilla kjole? Kanskje du vil bruke mange farger i håret til enhjørningen? Du bestemmer selv. Bruk fantasien!
