            - generic [ref=e55]:
              - 'heading "Tips for fargelegging: Hvordan kan du fargelegge \"Alv klipper håret til enhjørningen\" på best mulig måte?" [level=2] [ref=e56]'
              - paragraph [ref=e57]: Når du skal fargelegge bildet med alven og enhjørningen, kan du bruke fantasien din. Manen til enhjørningen kan ha alle regnbuens farger, og klærne til alven kan glitre som stjerner. Du kan bruke fargeblyanter eller tusjer. Prøv deg fram med forskjellige farger, og bruk gjerne flere farger sammen. Speil og børster i frisørsalongen kan også få fine og morsomme farger. Frisørstolen kan bli ekstra flott med gull og sølv. I bakgrunnen kan du lage en spennende skog med blå og grønne farger. Husk at det er du som bestemmer hvordan det skal se ut!
              - 'heading "Mulige fargeleggingsutfordringer: Hvilke områder er vanskelig å fargelegge og trenger særlig fokus for \"Alv klipper håret til enhjørningen\"?" [level=2] [ref=e58]'
              - list [ref=e59]:
