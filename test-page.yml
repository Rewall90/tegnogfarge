                  - strong [ref=e61]: Enhjørningens man
                  - text: ": Det kan være litt vanskelig å fargelegge alle krøllene. Prøv å bruke flere farger sammen, slik at det ser levende ut."
                - listitem [ref=e62]:
                  - strong [ref=e63]: Detaljer på alvens klær
                  - text: ": Klærne til alven har små mønstre. Da er det lurt å bruke en spiss blyant. Ta deg god tid, og fargelegg nøye."
                - listitem [ref=e64]:
                  - strong [ref=e65]: Speil og glans
                  - text: ": Det kan være litt tricky å få speil til å se fine ut. Prøv å bruke blyanten eller tusjen lett, så speilet ser blankt ut og reflekterer litt av fargene rundt."
              - heading "Fordeler med å fargelegge \"Alv klipper håret til enhjørningen\"" [level=2] [ref=e66]
              - paragraph [ref=e67]: Dette morsomme bildet gir deg mange muligheter til å bruke fantasien. Du kan lage ditt eget magiske univers med mange fine farger. Når du fargelegger små deler, som klærne til alven og håret til enhjørningen, trener du på å bruke hånden din rolig og presist. Da blir du flinkere til å styre blyanten. Det er også bra for konsentrasjonen, fordi du må følge med på de små detaljene. Å fargelegge gjør det lettere å holde fokus, og det kan hjelpe deg i andre ting også.
